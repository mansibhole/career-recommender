<h1>Your Prediction History</h1>

<table border="1">
<tr>
    <th>Skill</th>
    <th>Interest</th>
    <th>Marks</th>
    <th>Career</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
</tr>
{% endfor %}

</table>
