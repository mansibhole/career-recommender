<!DOCTYPE html>
<html>
<head>
    <title>Career Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand">Career Recommender</a>
    <div>
      <a href="/" class="btn btn-light btn-sm">Home</a>
      <a href="/dashboard" class="btn btn-warning btn-sm">Dashboard</a>
      <a href="/login" class="btn btn-danger btn-sm">Login</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center">Find Your Ideal Career 🚀</h2>

    <form action="/predict" method="post" class="card p-4 shadow mt-4">

        <select name="skills" class="form-control mb-3" required>
            <option value="">Select Skill</option>
            <option>python</option>
            <option>java</option>
            <option>html</option>
            <option>c++</option>
        </select>

        <select name="interest" class="form-control mb-3" required>
            <option value="">Select Interest</option>
            <option>ai</option>
            <option>web</option>
            <option>data</option>
            <option>ml</option>
            <option>design</option>
        </select>

        <input type="number" name="marks" class="form-control mb-3" placeholder="Enter Marks" required>

        <button class="btn btn-success">Get Career</button>
    </form>

    {% if result %}
    <div class="alert alert-success mt-4 text-center">
        <h4>Recommended Career: {{ result }}</h4>
    </div>
    {% endif %}

</div>

</body>
</html>
